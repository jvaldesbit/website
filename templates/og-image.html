<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #0a0e1a;
      font-family: 'Raleway', 'Segoe UI', Arial, sans-serif;
      color: #e6edf3;
      position: relative;
    }

    /* Grid */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    .glow-tl {
      position: absolute;
      top: -150px; left: -100px;
      width: 620px; height: 620px;
      background: radial-gradient(circle, rgba(0,255,136,0.1) 0%, transparent 60%);
    }
    .glow-tr {
      position: absolute;
      top: -80px; right: -80px;
      width: 460px; height: 460px;
      background: radial-gradient(circle, rgba(0,212,255,0.08) 0%, transparent 65%);
    }

    .accent-bar {
      position: absolute;
      left: 0; top: 0;
      width: 6px; height: 100%;
      background: linear-gradient(180deg, #00ff88, #00d4ff);
    }

    .deco-line {
      position: absolute;
      top: 0; right: 300px;
      width: 1px; height: 100%;
      background: linear-gradient(180deg, transparent, rgba(0,255,136,0.12), transparent);
      transform: rotate(8deg) scaleY(1.6);
      transform-origin: center;
    }

    /* Layout */
    .wrap {
      position: relative;
      z-index: 1;
      height: 100%;
      padding: 48px 68px 44px 80px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .top {
      font-size: 15px;
      font-weight: 600;
      color: rgba(0,255,136,0.45);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .middle {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding-bottom: 28px;
    }

    .tags {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .tag {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 4px 13px;
      border-radius: 20px;
      background: rgba(0,255,136,0.1);
      color: #00ff88;
      border: 1px solid rgba(0,255,136,0.25);
    }

    .title {
      font-size: 52px;
      font-weight: 900;
      color: #ffffff;
      line-height: 1.1;
      letter-spacing: -1.5px;
      margin-bottom: 20px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .description {
      font-size: 20px;
      font-weight: 400;
      color: #8892b0;
      line-height: 1.5;
      max-width: 860px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, rgba(0,255,136,0.4), rgba(0,212,255,0.2), transparent);
      margin-bottom: 22px;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .author-name {
      font-size: 18px;
      font-weight: 800;
      color: #ffffff;
    }
    .author-role {
      font-size: 13px;
      color: #8892b0;
      margin-top: 2px;
    }
    .logo-mark {
      font-size: 28px;
      font-weight: 900;
      background: linear-gradient(135deg, #00ff88, #00d4ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }
  </style>
</head>
<body>
  <div class="glow-tl"></div>
  <div class="glow-tr"></div>
  <div class="accent-bar"></div>
  <div class="deco-line"></div>

  <div class="wrap">
    <div class="top">jcvb.com.co &nbsp;·&nbsp; Blog</div>

    <div class="middle">
      <div class="tags">{{tags}}</div>
      <h1 class="title">{{title}}</h1>
      <p class="description">{{description}}</p>
    </div>

    <div>
      <div class="divider"></div>
      <div class="footer">
        <div>
          <div class="author-name">Julián Valdés Bello</div>
          <div class="author-role">Software Architect · Technical Lead</div>
        </div>
        <div class="logo-mark">JCVB</div>
      </div>
    </div>
  </div>
</body>
</html>
